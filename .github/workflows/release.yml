name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish the DMG
    runs-on: macos-14

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Build the DMG
        run: ./build-dmg.sh

      - name: Create the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
